services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interxchange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interxchange}
      POSTGRES_DB: ${POSTGRES_DB:-interxchange}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interxchange}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - interxchange

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - interxchange

  vault:
    image: hashicorp/vault:1.21.4
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev_token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "vault status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interxchange

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-interxchange}:${POSTGRES_PASSWORD:-interxchange}@postgres/${POSTGRES_DB:-interxchange}
      - REDIS_URL=redis://redis:6379/0
      - VAULT_URL=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-dev_token}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_jwt_secret}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY:-dev_refresh_secret}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - interxchange

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api/v1}
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - interxchange

volumes:
  postgres_data:

networks:
  interxchange:
    driver: bridge
