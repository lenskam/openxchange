version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: interxchange
      POSTGRES_PASSWORD: interxchange
      POSTGRES_DB: interxchange
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interxchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  vault:
    image: vault:1.15.5
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev_token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://interxchange:interxchange@postgres/interxchange
      - REDIS_URL=redis://redis:6379/0
      - VAULT_URL=http://vault:8200
      - VAULT_TOKEN=dev_token
      - JWT_SECRET_KEY=dev_jwt_secret
      - JWT_REFRESH_SECRET_KEY=dev_refresh_secret
      - JWT_ALGORITHM=HS256
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      vault:
        condition: service_started

volumes:
  postgres_data:
